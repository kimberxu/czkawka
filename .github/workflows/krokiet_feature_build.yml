name: Build Krokiet Feature Branch

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    name: Build Feature Branch

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: feature/krokiet-improved-selection

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Configure Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build CLI
        run: cargo build --release --bin czkawka_cli

      - name: Build Krokiet (GUI)
        run: cargo build --release --bin krokiet --no-default-features --features "winit_skia_opengl,winit_software"

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Krokiet_Feature_Build
          path: |
            target/release/czkawka_cli.exe
            target/release/krokiet.exe
          if-no-files-found: error
