name: 编译 Krokiet (Windows界面版)

# 仍然是手动点击触发
on:
  workflow_dispatch:

jobs:
  build-gui:
    runs-on: windows-latest

    steps:
      # 1. 下载代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 配置 Rust 环境
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # 3. 编译 Krokiet
      # 参考官方配置：禁用默认功能，启用 skia_opengl (兼容性好) 和 software 渲染
      # 官方脚本里有一些复杂的文本替换(sed/powershell)是为了优化体积，这里为了稳健我们直接编译
      - name: Build Krokiet
        run: cargo build --release --bin krokiet --no-default-features --features "winit_skia_opengl,winit_software"

      # 4. 上传编译好的文件
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: krokiet_windows_gui
          # 注意：编译出来的文件名叫 krokiet.exe
          path: target/release/krokiet.exe
          if-no-files-found: error
